<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="PWA zum Deutschlernen für den Integrationskurs, DTZ B1 und Leben in Deutschland.">
    <title>Deutsch B1 Begleiter</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260623dtz-neu-klein">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="stylesheet" href="./styles.css?v=20260623dtz-neu-klein">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Integrationskurs Deutsch</p>
          <h1>Deutsch B1 Begleiter</h1>
        </div>
        <button id="installBtn" class="ghost hidden" type="button">Installieren / Anleitung</button>
      </header>

      <nav id="nav" class="nav" aria-label="Hauptbereiche"></nav>

      <main id="app" class="content" tabindex="-1"></main>
    </div>

    <template id="modalTemplate">
      <div class="modal-backdrop">
        <section class="modal" role="dialog" aria-modal="true">
          <button class="modal-close" type="button" aria-label="Schließen">x</button>
          <div class="modal-body"></div>
        </section>
      </div>
    </template>

    <script>
      (function loadApp() {
        var script = document.createElement("script");
        script.src = "./app.js?v=20260623dtz-neu-klein";
        script.defer = true;
        script.onerror = function () {
          var app = document.getElementById("app");
          if (app) {
            app.innerHTML = '<section class="card"><h2>Die App-Datei fehlt.</h2><p>Bitte laden Sie die Datei <strong>app.js</strong> zusammen mit allen anderen Dateien und dem Ordner <strong>assets</strong> in GitHub hoch.</p></section>';
          }
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
